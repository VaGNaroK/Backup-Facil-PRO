name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Windows Build Script
        shell: powershell
        env:
          CI: true
        run: |
          .\scripts\gerar_exe.ps1

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

  build-linux-deb:
    name: Build Linux (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libglib2.0-dev pkg-config
      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          source venv/bin/activate
          python -m PyInstaller --noconsole --onefile --name "Backup_Facil_Pro" \
            --icon="assets/icons/icon.png" \
            --add-data "assets:assets" \
            --hidden-import=plyer.platforms.linux.notification \
            --paths "src" \
            src/main.py

      - name: Create .deb package
        run: |
          VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' src/logic.py)
          BUILD_DIR="build_deb"
          mkdir -p $BUILD_DIR/DEBIAN
          mkdir -p $BUILD_DIR/usr/bin
          mkdir -p $BUILD_DIR/usr/share/applications
          mkdir -p $BUILD_DIR/usr/share/icons/hicolor/256x256/apps
          
          cp dist/Backup_Facil_Pro $BUILD_DIR/usr/bin/backup-facil-pro
          chmod +x $BUILD_DIR/usr/bin/backup-facil-pro
          cp assets/icons/icon.png $BUILD_DIR/usr/share/icons/hicolor/256x256/apps/backup-facil-pro.png
          
          cat <<EOF > $BUILD_DIR/usr/share/applications/backup-facil-pro.desktop
          [Desktop Entry]
          Name=Backup Fácil Pro
          Comment=Ferramenta profissional para automação de backups
          Exec=/usr/bin/backup-facil-pro
          Icon=backup-facil-pro
          Terminal=false
          Type=Application
          Categories=Utility;System;Archiving;
          EOF
          
          cat <<EOF > $BUILD_DIR/DEBIAN/control
          Package: backup-facil-pro
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: VaGNaroK
          Description: Ferramenta de desktop robusta para automação, gestão e criptografia de backups locais.
          EOF
          
          dpkg-deb --build $BUILD_DIR backup-facil-pro_${VERSION}_amd64.deb

      - name: Upload Debian Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"

  build-linux-flatpak:
    name: Build Linux (.flatpak)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Flatpak Builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: |
          VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' src/logic.py)
          flatpak-builder build-dir io.github.vagnarok.BackupFacilPro.yml --force-clean --user --install-deps-from=flathub
          flatpak build-bundle build-dir Backup_Facil_Pro_v${VERSION}.flatpak io.github.vagnarok.BackupFacilPro

      - name: Upload Flatpak Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: "*.flatpak"

  release:
    name: Create Release
    needs: [build-windows, build-linux-deb, build-linux-flatpak]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
